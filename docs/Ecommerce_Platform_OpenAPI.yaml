openapi: 3.0.3
info:
  title: Ecommerce Platform API
  version: 1.0.0
  description: Current implemented API contract for the Laravel ecommerce platform.
servers:
  - url: http://localhost:8000/api/v1
    description: Local Laravel development server
tags:
  - name: Auth
  - name: Catalog
  - name: Cart
  - name: Checkout
  - name: Customer
  - name: Admin Customers
  - name: Orders
  - name: Payments
  - name: Inventory
  - name: Shipping
  - name: Reports
  - name: Settings
  - name: Users
security:
  - bearerAuth: []
paths:
  /auth/customer/register:
    post:
      tags: [Auth]
      summary: Register customer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "422":
          $ref: "#/components/responses/ValidationError"
  /auth/customer/login:
    post:
      tags: [Auth]
      summary: Login customer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "422":
          $ref: "#/components/responses/ValidationError"
  /auth/customer/password/forgot:
    post:
      tags: [Auth]
      summary: Request customer password reset
      security: []
      requestBody:
        $ref: "#/components/requestBodies/ForgotPassword"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /auth/customer/password/reset:
    post:
      tags: [Auth]
      summary: Reset customer password
      security: []
      requestBody:
        $ref: "#/components/requestBodies/ResetPassword"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "422":
          $ref: "#/components/responses/ValidationError"
  /auth/customer/me:
    get:
      tags: [Auth]
      summary: Get current customer
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/customer/logout:
    post:
      tags: [Auth]
      summary: Logout current customer token
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /auth/customer/logout-all:
    post:
      tags: [Auth]
      summary: Logout all customer tokens
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /catalog/products:
    get:
      tags: [Catalog]
      summary: List public products
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /catalog/products/{slug}:
    get:
      tags: [Catalog]
      summary: Show public product
      security: []
      parameters:
        - $ref: "#/components/parameters/Slug"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/NotFound"
  /categories:
    get:
      tags: [Catalog]
      summary: Admin category list
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Catalog]
      summary: Create category
      requestBody:
        $ref: "#/components/requestBodies/Category"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /categories/{id}:
    get:
      tags: [Catalog]
      summary: Show category
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Catalog]
      summary: Update category
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Category"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Catalog]
      summary: Delete category
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /products:
    get:
      tags: [Catalog]
      summary: Admin product list
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Catalog]
      summary: Create product
      requestBody:
        $ref: "#/components/requestBodies/Product"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /products/{id}:
    get:
      tags: [Catalog]
      summary: Show product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Catalog]
      summary: Update product
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Product"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Catalog]
      summary: Delete product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /products/{id}/publish:
    post:
      tags: [Catalog]
      summary: Publish product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /products/{id}/unpublish:
    post:
      tags: [Catalog]
      summary: Unpublish product
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /cart/guest:
    post:
      tags: [Cart]
      summary: Create guest cart
      security: []
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /cart/guest/{cartToken}:
    get:
      tags: [Cart]
      summary: Show guest cart
      security: []
      parameters:
        - $ref: "#/components/parameters/CartTokenPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Cart]
      summary: Clear guest cart
      security: []
      parameters:
        - $ref: "#/components/parameters/CartTokenPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /cart/guest/{cartToken}/items:
    post:
      tags: [Cart]
      summary: Add guest cart item
      security: []
      parameters:
        - $ref: "#/components/parameters/CartTokenPath"
      requestBody:
        $ref: "#/components/requestBodies/CartItem"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /cart/guest/{cartToken}/items/{itemId}:
    put:
      tags: [Cart]
      summary: Update guest cart item
      security: []
      parameters:
        - $ref: "#/components/parameters/CartTokenPath"
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        $ref: "#/components/requestBodies/CartItem"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Cart]
      summary: Remove guest cart item
      security: []
      parameters:
        - $ref: "#/components/parameters/CartTokenPath"
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customer/cart:
    get:
      tags: [Cart]
      summary: Show customer cart
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Cart]
      summary: Clear customer cart
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customer/cart/items:
    post:
      tags: [Cart]
      summary: Add customer cart item
      requestBody:
        $ref: "#/components/requestBodies/CartItem"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /customer/cart/items/{itemId}:
    put:
      tags: [Cart]
      summary: Update customer cart item
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        $ref: "#/components/requestBodies/CartItem"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Cart]
      summary: Remove customer cart item
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /checkout/validate:
    post:
      tags: [Checkout]
      summary: Validate checkout
      requestBody:
        $ref: "#/components/requestBodies/Checkout"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /checkout/submit:
    post:
      tags: [Checkout]
      summary: Submit checkout
      requestBody:
        $ref: "#/components/requestBodies/CheckoutSubmit"
      responses:
        "201":
          $ref: "#/components/responses/Success"

  /shipping/zones:
    get:
      tags: [Shipping]
      summary: List delivery zones
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Shipping]
      summary: Create delivery zone
      requestBody:
        $ref: "#/components/requestBodies/DeliveryZone"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /shipping/zones/{id}:
    get:
      tags: [Shipping]
      summary: Show delivery zone
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Shipping]
      summary: Update delivery zone
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/DeliveryZone"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Shipping]
      summary: Delete delivery zone
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /shipping/rates:
    get:
      tags: [Shipping]
      summary: List delivery rates
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Shipping]
      summary: Create delivery rate
      requestBody:
        $ref: "#/components/requestBodies/DeliveryRate"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /shipping/rates/{id}:
    get:
      tags: [Shipping]
      summary: Show delivery rate
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Shipping]
      summary: Update delivery rate
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/DeliveryRate"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Shipping]
      summary: Delete delivery rate
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /customer/profile:
    get:
      tags: [Customer]
      summary: Show customer profile
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Customer]
      summary: Update customer profile
      requestBody:
        $ref: "#/components/requestBodies/Profile"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customer/addresses:
    get:
      tags: [Customer]
      summary: List customer addresses
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Customer]
      summary: Create customer address
      requestBody:
        $ref: "#/components/requestBodies/Address"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /customer/addresses/{id}:
    get:
      tags: [Customer]
      summary: Show customer address
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Customer]
      summary: Update customer address
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Address"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Customer]
      summary: Delete customer address
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customer/orders:
    get:
      tags: [Customer]
      summary: Customer order history
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customer/orders/{id}:
    get:
      tags: [Customer]
      summary: Customer order detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /customers:
    get:
      tags: [Admin Customers]
      summary: Admin customer list
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customers/{id}:
    get:
      tags: [Admin Customers]
      summary: Admin customer support detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customers/{id}/status:
    patch:
      tags: [Admin Customers]
      summary: Update customer status
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/CustomerStatus"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /customers/{id}/notes:
    post:
      tags: [Admin Customers]
      summary: Add internal customer note
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Note"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /customers/{id}/tags:
    put:
      tags: [Admin Customers]
      summary: Replace customer tags
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Tags"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /orders:
    get:
      tags: [Orders]
      summary: Admin order list
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /orders/{id}:
    get:
      tags: [Orders]
      summary: Admin order detail
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order status
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/OrderStatus"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /orders/{id}/notes:
    post:
      tags: [Orders]
      summary: Add internal order note
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Note"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel order
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Cancel"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /orders/{id}/return-requests:
    post:
      tags: [Orders]
      summary: Create order return request
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/ReturnRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /orders/{id}/invoice:
    post:
      tags: [Orders]
      summary: Generate order invoice
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /orders/{id}/packing-slip:
    post:
      tags: [Orders]
      summary: Generate order packing slip
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /orders/{id}/shipments:
    post:
      tags: [Orders]
      summary: Link shipment to order
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/Shipment"
      responses:
        "201":
          $ref: "#/components/responses/Success"

  /payments/{id}/status:
    patch:
      tags: [Payments]
      summary: Update payment status
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/PaymentStatus"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /payments/{id}/cod/collect:
    post:
      tags: [Payments]
      summary: Mark COD payment collected
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /payments/webhooks/{provider}:
    post:
      tags: [Payments]
      summary: Payment provider webhook
      security:
        - webhookSignature: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /inventory/variants/{variantId}/adjust:
    post:
      tags: [Inventory]
      summary: Adjust inventory stock
      parameters:
        - $ref: "#/components/parameters/VariantId"
      requestBody:
        $ref: "#/components/requestBodies/InventoryQuantity"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /inventory/variants/{variantId}/reserve:
    post:
      tags: [Inventory]
      summary: Reserve inventory stock
      parameters:
        - $ref: "#/components/parameters/VariantId"
      requestBody:
        $ref: "#/components/requestBodies/InventoryQuantity"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /inventory/variants/{variantId}/release:
    post:
      tags: [Inventory]
      summary: Release reserved inventory stock
      parameters:
        - $ref: "#/components/parameters/VariantId"
      requestBody:
        $ref: "#/components/requestBodies/InventoryQuantity"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /reports/dashboard:
    get:
      tags: [Reports]
      summary: Dashboard KPIs
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/orders:
    get:
      tags: [Reports]
      summary: Orders report
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/sales:
    get:
      tags: [Reports]
      summary: Sales report
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/inventory:
    get:
      tags: [Reports]
      summary: Inventory report
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/customers:
    get:
      tags: [Reports]
      summary: Customers report
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /settings/store-profile:
    get:
      tags: [Settings]
      summary: Show store profile settings
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Settings]
      summary: Update store profile settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /settings/module-toggles:
    get:
      tags: [Settings]
      summary: Show module toggles
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Settings]
      summary: Update module toggles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /users:
    get:
      tags: [Users]
      summary: Admin user list
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Users]
      summary: Create admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /users/{id}:
    get:
      tags: [Users]
      summary: Show admin user
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Users]
      summary: Update admin user
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Users]
      summary: Delete admin user
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Success"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: integer
    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    CartTokenPath:
      name: cartToken
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 15
    From:
      name: from
      in: query
      schema:
        type: string
        format: date
    To:
      name: to
      in: query
      schema:
        type: string
        format: date
  responses:
    Success:
      description: Successful API response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
  requestBodies:
    ForgotPassword:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email:
                type: string
                format: email
    ResetPassword:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, token, password, password_confirmation]
            properties:
              email:
                type: string
                format: email
              token:
                type: string
              password:
                type: string
              password_confirmation:
                type: string
    Profile:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email]
            properties:
              name:
                type: string
              email:
                type: string
                format: email
              phone:
                type: string
                nullable: true
    Address:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AddressInput"
    Category:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    Product:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    CartItem:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: integer
              product_variant_id:
                type: integer
                nullable: true
              quantity:
                type: integer
                minimum: 1
    Checkout:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              shipping_address_id:
                type: integer
                nullable: true
              shipping_address:
                $ref: "#/components/schemas/AddressInput"
              billing_same_as_shipping:
                type: boolean
                default: true
              billing_address_id:
                type: integer
                nullable: true
              billing_address:
                $ref: "#/components/schemas/AddressInput"
              shipping_method:
                type: string
                example: standard
              payment_method:
                type: string
                example: cod
    CheckoutSubmit:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - type: object
                required: [idempotency_key]
                properties:
                  idempotency_key:
                    type: string
                    maxLength: 120
                    example: checkout-001
              - $ref: "#/components/requestBodies/Checkout/content/application~1json/schema"
    DeliveryZone:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
              code:
                type: string
                example: dhaka-city
              country:
                type: string
                example: BD
              states:
                type: array
                nullable: true
                items:
                  type: string
              cities:
                type: array
                nullable: true
                items:
                  type: string
              postal_codes:
                type: array
                nullable: true
                items:
                  type: string
              status:
                type: string
                enum: [active, inactive]
              sort_order:
                type: integer
    DeliveryRate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [delivery_zone_id, name, amount]
            properties:
              delivery_zone_id:
                type: integer
              name:
                type: string
              code:
                type: string
                example: inside-dhaka
              amount:
                type: number
                format: float
              min_order_amount:
                type: number
                nullable: true
              max_order_amount:
                type: number
                nullable: true
              status:
                type: string
                enum: [active, inactive]
              sort_order:
                type: integer
    CustomerStatus:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                type: string
                enum: [active, inactive, suspended]
    OrderStatus:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                $ref: "#/components/schemas/OrderStatusValue"
              note:
                type: string
                nullable: true
              metadata:
                type: object
                additionalProperties: true
    PaymentStatus:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                type: string
                enum: [pending, authorized, paid, failed, cancelled, refunded]
              transaction_id:
                type: string
                nullable: true
              provider_reference:
                type: string
                nullable: true
              metadata:
                type: object
                additionalProperties: true
    Note:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [note]
            properties:
              note:
                type: string
              metadata:
                type: object
                additionalProperties: true
    Tags:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [tags]
            properties:
              tags:
                type: array
                items:
                  type: string
    Cancel:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
              metadata:
                type: object
                additionalProperties: true
    ReturnRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
              metadata:
                type: object
                additionalProperties: true
    Shipment:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [carrier_name]
            properties:
              carrier_name:
                type: string
              tracking_number:
                type: string
                nullable: true
              tracking_url:
                type: string
                nullable: true
              status:
                type: string
                enum: [pending, shipped]
              metadata:
                type: object
                additionalProperties: true
    InventoryQuantity:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [quantity]
            properties:
              quantity:
                type: integer
              reason:
                type: string
              note:
                type: string
                nullable: true
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
        meta:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
        code:
          type: string
          nullable: true
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        password:
          type: string
        password_confirmation:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AddressInput:
      type: object
      required: [recipient_name, phone, address_line_1, city, country]
      properties:
        label:
          type: string
          nullable: true
        recipient_name:
          type: string
        phone:
          type: string
        address_line_1:
          type: string
        address_line_2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          example: BD
        is_default_shipping:
          type: boolean
        is_default_billing:
          type: boolean
    OrderStatusValue:
      type: string
      enum:
        - pending
        - confirmed
        - processing
        - packed
        - shipped
        - delivered
        - failed_delivery
        - return_requested
        - returned
        - refunded
        - cancelled
